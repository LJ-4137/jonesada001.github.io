<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Fish Puzzle</title>
        <style>
             section.grid-container {
                display: grid;
                gap: 3px;
                grid-template-columns: repeat(3, 1fr);
                grid-template-areas: 
                    'info1 info2 info3'
                    'p1 p2 p3'
                    'p4 p5 p6'
                    'p7 p8 p9';
             }
                div.peice-1, div.peice-2, div.peice-3, div.peice-4, div.peice-5, div.peice-6, div.peice-7, div.peice-8, div.peice-9 {
                  background-size: cover; /* Ensures the image covers the div */
                  width: 100px;
                  height: 66px;
             }
             div.peice-1 {
                background-image: url(1.jpg);
                grid-area: p1;
             }
             div.peice-2 {
                background-image: url(2.jpg);
                grid-area: p2;
             }
             div.peice-3 {
                background-image: url(3.jpg);
                grid-area: p3;
             }
             div.peice-4 {
                background-image: url(4.jpg);
                grid-area: p4;
             }
             div.peice-5 {
                background-image: url(5.jpg);
                grid-area: p5;
             }
             div.peice-6 {
                background-image: url(6.jpg);
                grid-area: p6;
             }
             div.peice-7 {
                background-image: url(7.jpg);
                grid-area: p7;
             }
             div.peice-8 {
                background-image: url(8.jpg);
                grid-area: p8;
             }
             div.peice-9 {
                background-image: url(9.jpg);
                grid-area: p9;
            }
            div.imposter {
                background-image: url(IMPOSTER.jpg);
                display: none;
             }
             div.info {
                background-color: #f0f0f0;
                text-align: center;
                padding: 10px;
                font-weight: bold;
             }
        </style>
    </head>
    <body>
        <section class="grid-container">
            <div class="info">Luca (Ada) Jones</div>
            <div class="info">Fish Puzzle</div>
            <div class="info">4/2/16</div>
            <div class="peice-1"></div>
            <div class="peice-2"></div>
            <div class="peice-3"></div>
            <div class="peice-4"></div>
            <div class="peice-5"></div>
            <div class="peice-6"></div>
            <div class="peice-7"></div>
            <div class="peice-8"></div>
            <div class="peice-9"></div>
            <div class="imposter"></div>
        </section>
    </body>
</html>
